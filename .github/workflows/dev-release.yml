name: Dev Release

on:
  push:
    branches: [main]

concurrency:
  group: dev-release
  cancel-in-progress: true

jobs:
  publish-dev:
    name: Publish dev version to PyPI
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests
        run: uv run pytest tests/ -x -q

      - name: Set dev version
        run: |
          BASE=$(python3 -c "import re; print(re.search(r'version\s*=\s*\"(.+?)\"', open('pyproject.toml').read()).group(1))")
          COMMITS=$(git rev-list --count HEAD)
          SHORT_SHA=$(git rev-parse --short HEAD)
          DEV_VERSION="${BASE}.dev${COMMITS}+${SHORT_SHA}"
          echo "DEV_VERSION=${DEV_VERSION}" >> $GITHUB_ENV
          sed -i "s/version = \"${BASE}\"/version = \"${DEV_VERSION}\"/" pyproject.toml
          echo "Publishing ${DEV_VERSION}"

      - name: Build package
        run: uv build

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
