site_name: Hive
site_description: "Local-first agent OS. Spawn persistent AI agents that collaborate, write code, and use tools autonomously."
site_url: https://chiruu12.github.io/Hive
repo_url: https://github.com/chiruu12/Hive
repo_name: chiruu12/Hive

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - search.highlight
    - search.suggest
    - toc.follow
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html

plugins:
  - search

nav:
  - Home: index.md
  - Getting Started:
    - Installation: getting-started/installation.md
    - Quickstart: getting-started/quickstart.md
    - CLI Quickstart: getting-started/cli-quickstart.md
  - Guide:
    - Developer Guide: guide/developer-guide.md
    - Suffering System: guide/suffering.md
    - Persona System: guide/persona.md
    - Architecture: guide/architecture.md
  - Extending:
    - Extension Points: extending/index.md
  - API Reference:
    - SDK Reference: api/sdk-reference.md
  - Examples:
    - Overview: examples/index.md
  - Contributing: contributing.md
  - Changelog: changelog.md
