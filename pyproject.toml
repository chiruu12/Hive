[project]
name = "hive-agent"
version = "0.3.0"
description = "Local-first agent OS. Spawn persistent AI agents that collaborate, write code, and use tools autonomously."
authors = [{ name = "chiruu12" }]
license = { text = "MIT" }
readme = "README.md"
requires-python = ">=3.11"
keywords = ["ai-agents", "multi-agent", "autonomous", "claude", "openai", "fireworks", "local-llm", "agent-os"]
classifiers = [
    "Development Status :: 3 - Alpha",
    "Environment :: Console",
    "Intended Audience :: Developers",
    "License :: OSI Approved :: MIT License",
    "Programming Language :: Python :: 3.11",
    "Programming Language :: Python :: 3.12",
    "Programming Language :: Python :: 3.13",
    "Topic :: Software Development :: Libraries :: Application Frameworks",
]

dependencies = [
    "typer>=0.12",
    "rich>=13.0",
    "httpx>=0.27",
    "aiosqlite>=0.20",
    "pyyaml>=6.0",
    "pydantic>=2.5",
    "anthropic>=0.40",
    "openai>=1.30",
    "python-dotenv>=1.0",
    "mcp>=1.27",
    "beautifulsoup4>=4.14.3",
    "tqdm>=4.67.3",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
    "mypy>=1.10",
    "types-PyYAML>=6.0",
]
chromadb = [
    "chromadb>=0.5",
    "sentence-transformers>=3.0",
]

[project.scripts]
hive = "hive.cli.main:app"
hive-mcp = "hive.mcp.server:main"

[project.urls]
Homepage = "https://github.com/chiruu12/Hive"
Repository = "https://github.com/chiruu12/Hive"
Issues = "https://github.com/chiruu12/Hive/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/hive"]

[tool.hatch.build.targets.wheel.force-include]
"profiles" = "hive/profiles"
"skills" = "hive/skills"
"models.yaml" = "hive/models.yaml"
"src/hive/tools/notepad/presets.yaml" = "hive/tools/notepad/presets.yaml"

[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "W", "UP"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_return_any = true
warn_unused_configs = true

[[tool.mypy.overrides]]
module = ["chromadb.*", "sentence_transformers.*", "tqdm.*"]
ignore_missing_imports = true

[tool.pytest.ini_options]
testpaths = ["tests"]
asyncio_mode = "auto"

[dependency-groups]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "ruff>=0.5",
    "mypy>=1.10",
    "types-pyyaml>=6.0",
    "twine>=6.0",
    "build>=1.0",
    "mkdocs-material>=9.7.6",
]
