# Local models (no API key needed)
local:
  - id: "lmstudio:auto"
    provider: lmstudio
    display: LM Studio (auto-detect)
    tier: routine
  - id: "ollama:llama3.2"
    provider: ollama
    display: Llama 3.2 (Ollama)
    tier: routine
